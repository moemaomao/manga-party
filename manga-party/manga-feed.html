  </div>      <script>    
  let currentTitle = "";    
      
  /* =========================    
     CACHE KEY    
  ========================= */    
  function getCacheKey(title) {    
    return "detail_" + title.toLowerCase().replace(/[^a-z0-9]/g, "");    
  }    
      
  function getChapterCacheKey(title) {    
    return "chapters_" + title.toLowerCase().replace(/[^a-z0-9]/g, "");    
  }    
    
    function normalize(str) {
  return str.toLowerCase().replace(/[^a-z0-9]/g, "");
}
  /* =========================  
       UPDATE META TAGS (PENTING!)  
    ========================= */  
    function updateMetaTags(manga) {  
      const title = manga.title + " - Mikoroku";  
      const desc = (manga.desc || "Baca " + manga.title + " terbaru dengan chapter lengkap di Mikoroku").substring(0, 200);  
      const image = manga.img || manga.cover || "https://via.placeholder.com/300x450";  
      const url = window.location.href;  
  
      // Update <title>  
      document.getElementById('pageTitle').textContent = title;  
  
      document.querySelector('meta[property="og:image"]')  
       ?.setAttribute("content", manga.img);  
  
     document.querySelector('meta[name="twitter:image"]')  
         ?.setAttribute("content", manga.img);  
        
      // Update Open Graph  
      document.getElementById('ogTitle').setAttribute('content', title);  
      document.getElementById('ogDescription').setAttribute('content', desc);  
      document.getElementById('ogImage').setAttribute('content', image);  
      document.getElementById('ogUrl').setAttribute('content', url);  
  
      // Update Twitter  
      document.getElementById('twitterTitle').setAttribute('content', title);  
      document.getElementById('twitterDescription').setAttribute('content', desc);  
      document.getElementById('twitterImage').setAttribute('content', image);  
  
      // Update basic meta description  
      document.getElementById('metaDescription').setAttribute('content', desc);  
    }  
  
    /* =========================  
       RENDER DETAIL (dengan update meta)  
    ========================= */  
    function renderDetail(manga) {  
      currentTitle = manga.title;  
      currentManga = manga;  
  
  
// ===== RATING FROM LABEL BLOGGER =====  
let ratingValue = null;  
let cleanGenres = [];  
  
if (manga.genres && Array.isArray(manga.genres)) {  
  manga.genres.forEach(g => {  
    let label = g.trim().replace(",", "");  
      
    if (/^\d+(\.\d+)?$/.test(label)) {  
      ratingValue = parseFloat(label); // ambil rating  
    } else {  
      cleanGenres.push(g); // simpan genre normal  
    }  
  });  
}  
  
// update genre tanpa rating  
manga.genres = cleanGenres;  
  
const ratingStars = document.getElementById("ratingStars");  
const ratingNumber = document.getElementById("ratingNumber");  
  
if (ratingValue !== null) {  
  ratingNumber.textContent = ratingValue.toFixed(1);  
    
  let starsHTML = "";  
  let starScore = ratingValue / 2;  
    
  for (let i = 1; i <= 5; i++) {  
    if (starScore >= i) {  
      starsHTML += '<i class="fas fa-star"></i>';  
    } else if (starScore >= i - 0.5) {  
      starsHTML += '<i class="fas fa-star-half-alt"></i>';  
    } else {  
      starsHTML += '<i class="far fa-star"></i>';  
    }  
  }  
    
  ratingStars.innerHTML = starsHTML;  
} else {  
  ratingStars.innerHTML = '<i class="far fa-star"></i>'.repeat(5);  
  ratingNumber.textContent = "-";  
}  
      
  document.getElementById('pageTitle').textContent = manga.title + " - Mikoroku";    
  document.getElementById('detailTitle').textContent = manga.title;    
      
  const coverImg = document.getElementById('detailCover');    
  coverImg.src = manga.img || manga.cover || '';    
      
  const bgLayer = document.getElementById('bgLayer');    
  bgLayer.style.backgroundImage = `url('${coverImg.src}')`;    
      
  document.getElementById('detailDesc').textContent = manga.desc || 'Synopsis tidak tersedia.';    
      
  // Data dari manga.info    
  document.getElementById('detailChapter').textContent =
  manga.chapter || manga.info?.chapter || '1 - ?';

document.getElementById('detailPublication').textContent =
  manga.publication || manga.info?.publication || '-';

document.getElementById('detailSerialization').textContent =
  manga.serialization || manga.info?.serialization || '-';

document.getElementById('detailAuthor').textContent =
  manga.author || manga.info?.author || '-';

document.getElementById('detailArtist').textContent =
  manga.artist || manga.info?.artist || '-';    
      
  // Latest Update - Ditempatkan di luar if(manga.info)    
  const latestEl = document.getElementById('detailLatestUpdate');  
if (latestEl) {  
  latestEl.textContent = "Loading...";  
}   
      
  const statusText = (manga.status || "UNKNOWN").toUpperCase();  
const statusEl = document.getElementById('detailStatus');  
const statusBox = statusEl.parentElement;  
  
statusEl.textContent = statusText;  
  
// reset class dulu  
statusBox.classList.remove(  
  "ongoing",  
  "completed",  
  "hiatus",  
  "dropped",  
  "canceled",  
  "unknown"  
);  
  
// set class berdasarkan status  
statusBox.classList.add(statusText.toLowerCase());    
      
  const genreContainer = document.getElementById('detailGenres');    
  genreContainer.innerHTML = manga.genres ?    
    manga.genres.map(g => `<div class="genre">${g}</div>`).join('') :    
    '';    
    
  loadChapters(manga.title);    
  checkBookmarkStatus();    
}    
  
      
  /* =========================    
     LOAD DETAIL    
  ========================= */    
  function loadDetail() {  
  const params = new URLSearchParams(window.location.search);  
  const slug = params.get("slug");  
    
  const saved = localStorage.getItem("currentManga");  
    
  // ✅ kalau ada di localStorage → pakai  
  if (saved) {  
    const manga = JSON.parse(saved);  
    renderDetail(manga);  
    return;  
  }  
    
  // ❌ kalau tidak ada → ambil dari slug  
  if (!slug) return;  
    
  document.getElementById("detailTitle").textContent = "Loading...";  
    
  const script = document.createElement("script");  
  const base = getFeedBase();
script.src = `${base}feeds/posts/default?alt=json-in-script&max-results=200&callback=detailSlugCallback`;  
  document.body.appendChild(script);  
    
  window.detailSlugCallback = function(data) {  
    if (!data.feed || !data.feed.entry) return;  
      
    const entry = data.feed.entry.find(p => {  
  const title = p.title.$t.toLowerCase()  
    .replace(/[^a-z0-9\s-]/g, "")  
    .replace(/\s+/g, "-");  
    
  return title === slug || slug.includes(title) || title.includes(slug);  
});  
      
    if (!entry) {  
  document.querySelector(".container").innerHTML = `  
    <div style="  
      text-align:center;  
      padding:80px 20px;  
      color:#aaa;  
      font-size:18px;  
    ">  
      📭 Judul tidak ditemukan  
    </div>  
  `;  
  return;  
}  
      
    const parser = document.createElement("div");  
    parser.innerHTML = entry.content?.$t || "";  
      
    const desc = parser.innerText.trim().substring(0, 500);  
      
    const manga = {  
      title: entry.title.$t,  
      img: entry.media$thumbnail?.url.replace("s72-c", "s500") || "",  
      desc: desc,  
      genres: entry.category?.map(c => c.term) || [],  
      status: "",  
      info: {}  
    };  
      
    localStorage.setItem("currentManga", JSON.stringify(manga));  
    renderDetail(manga);  
  };  
}  
      
      
  /* =========================    
     JSONP CALLBACK    
  ========================= */  
  window.chapterCallback = function(data) {
  
  const list = document.getElementById("chapterList");
  
  if (!data.feed || !data.feed.entry) {
    list.innerHTML = "<p style='color:#aaa;text-align:center;'>No chapters found</p>";
    return;
  }
  
  let html = "";
  let latestDate = null;
  
  data.feed.entry.forEach(entry => {
    
    const rawTitle = entry.title.$t;
    
    /* ================= MATCH TITLE ================= */
    const titleMatch =
      normalize(rawTitle).includes(normalize(currentTitle));
    
    /* ================= MATCH LABEL ================= */
    let labelMatch = false;
    
    if (entry.category) {
      labelMatch = entry.category.some(cat =>
        normalize(cat.term) === normalize(currentTitle)
      );
    }
    
    /* ================= FILTER ================= */
    if (!titleMatch && !labelMatch) return;
    
    
    /* ================= LINK ================= */
    const link = entry.link.find(l => l.rel === "alternate").href;
    
    
    /* ================= DATE ================= */
    let dateStr = entry.updated?.$t || entry.published?.$t;
    
    if (!dateStr && data.feed.updated?.$t) {
      dateStr = data.feed.updated.$t;
    }
    
    if (dateStr) {
      const dateObj = new Date(dateStr);
      if (!latestDate || dateObj > latestDate) {
        latestDate = dateObj;
      }
    }
    
    
    /* ================= CHAPTER NUMBER ================= */
    let chapterNum = rawTitle.match(/(\d+(\.\d+)?)/)?.[0] || "?";
    let chapterLabel = `Chapter ${chapterNum}`;
    
    
    /* ================= IMAGE ================= */
    let img = "https://via.placeholder.com/300x200/111/fff?text=Chapter";
    
    let images = [];
    if (entry.content?.$t) {
      const matches = [...entry.content.$t.matchAll(/<img.*?src=["'](.*?)["']/g)];
      images = matches.map(m => m[1]);
    }
    
    if (images.length >= 3) {
      img = images[2];
    } else if (images.length > 0) {
      img = images[0];
    }
    
    img = img.replace(/\/s\d+/, "/s100");
    
    
    /* ================= RENDER ================= */
    html += `
<div class="chapter-item" onclick="openChapter('${link}', '${chapterLabel}')">
<img src="${img}" loading="lazy">
<div class="chapter-label">${chapterLabel}</div>
</div>
`;
    
  });
  
  
  if (!html) {
    list.innerHTML = "<p style='color:#aaa;text-align:center;'>No chapters found</p>";
    return;
  }
  
  list.innerHTML = html;
  applyReadMark();
  
  
  /* ================= LATEST UPDATE ================= */
  const latestEl = document.getElementById("detailLatestUpdate");
  if (latestEl) {
    latestEl.textContent = latestDate ?
      latestDate.toLocaleDateString("en-US", {
        day: "numeric",
        month: "long",
        year: "numeric"
      }) : "-";
  }
  
  
  /* ================= CACHE ================= */
  const cacheKey = getChapterCacheKey(currentTitle);
  
  localStorage.setItem(cacheKey, JSON.stringify({
    html: html,
    latest: latestDate
  }));
  
}; 
      
  /* =========================    
     LOAD CHAPTERS    
  ========================= */    
  function loadChapters(title) {  
  const list = document.getElementById("chapterList");  
  const cacheKey = getChapterCacheKey(title);  
  const cached = localStorage.getItem(cacheKey);  
    
  if (cached) {  
    try {  
      const data = JSON.parse(cached);  
        
      list.innerHTML = data.html;  
      applyReadMark();  
        
      const latestEl = document.getElementById("detailLatestUpdate");  
      if (latestEl && data.latest) {  
        latestEl.textContent = new Date(data.latest).toLocaleDateString("id-ID", {  
          day: "numeric",  
          month: "long",  
          year: "numeric"  
        });  
      }  
        
    } catch (e) {  
      // fallback cache lama (HTML)  
      list.innerHTML = cached;  
      applyReadMark();  
    }  
      
  } else {  
    list.innerHTML = `<p style="text-align:center;padding:20px;color:#aaa;">Loading chapters...</p>`;  
  }  
    
  const s = document.createElement("script");  
  const base = getFeedBase();
s.src = `${base}feeds/posts/default?alt=json-in-script&max-results=200&callback=chapterCallback&q=${encodeURIComponent(title)}`;  
  document.body.appendChild(s);  
}  
      
window.ratingCallback = function(data) {  
  console.log("RATING FEED:", data);  
  if (!data.feed || !data.feed.entry) return;  
    
  const entry = data.feed.entry[0];  
  if (!entry.category) return;  
    
  let ratingValue = null;  
    
  entry.category.forEach(cat => {  
    const label = cat.term.trim();  
    if (/^\d+(\.\d+)?$/.test(label)) {  
      ratingValue = parseFloat(label);  
    }  
  });  
    
  const ratingStars = document.getElementById("ratingStars");  
  const ratingNumber = document.getElementById("ratingNumber");  
    
  if (ratingValue !== null) {  
    ratingNumber.textContent = ratingValue.toFixed(1);  
      
    let starsHTML = "";  
    let starScore = ratingValue / 2;  
      
    for (let i = 1; i <= 5; i++) {  
      if (starScore >= i) {  
        starsHTML += '<i class="fas fa-star"></i>';  
      } else if (starScore >= i - 0.5) {  
        starsHTML += '<i class="fas fa-star-half-alt"></i>';  
      } else {  
        starsHTML += '<i class="far fa-star"></i>';  
      }  
    }  
      
    ratingStars.innerHTML = starsHTML;  
  }  
};  
      
    function applyReadMark() {  
  const key = "read_" + currentTitle;  
  const read = JSON.parse(localStorage.getItem(key) || "[]");  
    
  document.querySelectorAll(".chapter-item").forEach(item => {  
    const label = item.querySelector(".chapter-label")?.textContent || "";  
      
    // ambil nomor chapter saja  
    const chapterNum = label.match(/(\d+(\.\d+)?)/)?.[0];  
      
    if (read.includes(chapterNum)) {  
      item.classList.add("read");  
    }  
  });  
}  
      function getFeedBase() {
  let base = localStorage.getItem("feedBlogUrl");
  
  if (!base) {
    try {
      const saved = JSON.parse(localStorage.getItem("currentManga"));
      base = saved?.source || "";
    } catch (e) {}
  }
  
  if (!base) return "";
  
  if (!base.endsWith("/")) base += "/";
  
  return base;
}
  
      
  /* =========================    
     BOOKMARK FIX (NO INNERHTML BUG)    
  ========================= */    
  function updateBookmarkUI(isSaved) {    
    const btn = document.getElementById('bookmarkBtn');    
    const text = document.getElementById('bookmarkText');    
    const icon = btn.querySelector("i");    
        
    if (isSaved) {    
      btn.classList.add("bookmarked");    
      icon.className = "fas fa-check";    
      text.textContent = "Bookmarked";    
    } else {    
      btn.classList.remove("bookmarked");    
      icon.className = "fas fa-bookmark";    
      text.textContent = "Bookmark";    
    }    
  }    
      
  function checkBookmarkStatus() {    
    const bookmarks = JSON.parse(localStorage.getItem("mangaBookmarks") || "[]");    
    updateBookmarkUI(bookmarks.includes(currentTitle));    
  }    
      
  document.getElementById('bookmarkBtn').addEventListener('click', () => {    
    if (!currentTitle) return;    
        
    let bookmarks = JSON.parse(localStorage.getItem("mangaBookmarks") || "[]");    
    const index = bookmarks.indexOf(currentTitle);    
        
    if (index === -1) {    
      bookmarks.push(currentTitle);    
      updateBookmarkUI(true);    
    } else {    
      bookmarks.splice(index, 1);    
      updateBookmarkUI(false);    
    }    
        
    localStorage.setItem("mangaBookmarks", JSON.stringify(bookmarks));    
  });    
      
    function markChapterRead(chapter) {  
  const key = "read_" + currentTitle;  
  let read = JSON.parse(localStorage.getItem(key) || "[]");  
    
  const chapterNum = chapter.match(/(\d+(\.\d+)?)/)?.[0];  
    
  if (!read.includes(chapterNum)) {  
    read.push(chapterNum);  
    localStorage.setItem(key, JSON.stringify(read));  
  }  
}  
      
    function openChapter(url, chapter) {  
    
  // tandai sudah dibaca  
  markChapterRead(chapter);  
    
  const slug = (currentTitle + " " + chapter)  
    .toLowerCase()  
    .replace(/[^a-z0-9\s-]/g, "")  
    .replace(/\s+/g, "-");  
    
  const chapterData = {  
    url: url,  
    chapter: chapter,  
    title: currentTitle,  
    slug: slug  
  };  
    
  localStorage.setItem("currentChapter", JSON.stringify(chapterData));  
    
  window.location.href = `reader-feed.html?slug=${slug}`;  
}  
  
  /* =========================    
     INIT    
  ========================= */    
  window.addEventListener("DOMContentLoaded", loadDetail);    
</script>
